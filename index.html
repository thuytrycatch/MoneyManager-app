<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="description" content="Quản lý chi tiêu cá nhân — nhập tiếng Việt tự nhiên, lưu lên GitHub." />

  <!-- PWA / mobile web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chi Tiêu Việt" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Chi Tiêu Việt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Chart.js (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Màn hình loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Đang kết nối GitHub…</div>
  </div>

  <!-- Ứng dụng -->
  <div id="appShell" class="app-shell hidden">
    <header class="header">
      <span class="brand" id="appName">Chi Tiêu Việt</span>
      <div class="header-actions">
        <button id="langToggle" title="VI / EN">VI</button>
        <button id="themeToggle" title="Dark / Light">🌗</button>
      </div>
    </header>

    <div id="syncStatus" class="sync-status"></div>

    <main id="view"></main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="home"><span class="nav-icon">🏠</span><span>Trang chủ</span></button>
      <button class="nav-btn" data-tab="add"><span class="nav-icon">➕</span><span>Thêm</span></button>
      <button class="nav-btn" data-tab="stats"><span class="nav-icon">📊</span><span>Thống kê</span></button>
      <button class="nav-btn" data-tab="settings"><span class="nav-icon">⚙️</span><span>Cài đặt</span></button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <!-- config.js (tùy chọn, dùng cho chạy cục bộ). Trên GitHub Pages không có file
       này — app sẽ lấy cấu hình từ tab Cài đặt (lưu localStorage). onerror để
       không báo lỗi khi file không tồn tại. -->
  <script src="config.js" onerror="window.__noConfig=1"></script>
  <script src="js/parser.js"></script>
  <script src="js/github.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
