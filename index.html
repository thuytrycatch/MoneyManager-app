<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Sổ Thu Chi — quản lý thu chi gia đình: báo cáo tuần/tháng/năm, cảnh báo ngân sách, nhập tiếng Việt tự nhiên." />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sổ Thu Chi" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- PWA: installable + offline -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <title>Sổ Thu Chi — Quản lý thu chi gia đình</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css?v=1.4.0" />
</head>
<body>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Đang khởi động…</div>
  </div>

  <!-- Connect / login screen (rendered by app.js) -->
  <div id="authScreen" class="auth-screen hidden"></div>

  <div id="appShell" class="app-shell hidden">
    <header class="header">
      <span class="brand" id="appName">Sổ Thu Chi</span>
      <div class="header-actions">
        <button id="refreshBtn" title="Làm mới"></button>
        <button id="langToggle" title="VI / EN">VI</button>
        <button id="themeToggle" title="Sáng / Tối">🌗</button>
      </div>
    </header>

    <div id="syncStatus" class="sync-status"></div>
    <main id="view"></main>
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <div id="toast" class="toast"></div>

  <!-- config.js (optional, used for local runs). On GitHub Pages this file is
       absent — the app reads config from the "Kết nối Supabase" screen (localStorage). -->
  <!-- ?v=1.4.0
       release so browsers fetch fresh assets instead of a cached copy — do not bump by hand. -->
  <script src="config.js" onerror="window.__noConfig=1"></script>
  <script src="js/parser.js?v=1.4.0"></script>
  <script src="js/store.js?v=1.4.0"></script>
  <script src="js/charts.js?v=1.4.0"></script>
  <script src="js/app.js?v=1.4.0"></script>

  <!-- Register the service worker (PWA). Guarded: only over http(s), never file://. -->
  <script>
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () { /* ignore */ });
      });
    }
  </script>
</body>
</html>
